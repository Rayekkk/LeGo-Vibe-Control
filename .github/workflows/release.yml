name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: src/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: cd src && pnpm install

      - name: Build frontend
        run: cd src && pnpm run build

      - name: Package release zip
        run: |
          VERSION=${GITHUB_REF_NAME}
          ZIP="ally-vibe-control-${VERSION}.zip"
          mkdir -p package/ally-vibe-control/dist
          mkdir -p package/ally-vibe-control/src
          cp main.py plugin.json package.json LICENSE README.md package/ally-vibe-control/
          cp dist/index.js package/ally-vibe-control/dist/
          cp src/index.tsx src/rollup.config.js src/tsconfig.json src/package.json package/ally-vibe-control/src/
          cd package && zip -r "../${ZIP}" ally-vibe-control/
          echo "ZIP=${ZIP}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP }}
          generate_release_notes: true
          body: |
            ## Install

            1. Download `${{ env.ZIP }}` below.
            2. In Steam, open the Decky Loader menu → **Developer** → **Install Plugin from ZIP**.
            3. Select the downloaded zip file.
            4. The plugin appears in the Quick Access Menu under the 📳 icon.

            ## What's new

            See the commit history for details.
